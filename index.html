<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>논리 루트 — 결착</title>
<style>
  :root{
    --bg:#0c0e13; --panel:#151823; --line:#2a3040; --ink:#e9ecf2; --muted:#8b93a6;
    --mina:#5fb4ff; --toki:#ff6b6b; --tsuki:#7ee0c0; --gold:#ffd54a;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:radial-gradient(130% 100% at 50% 0%,#171b27 0%,var(--bg) 60%);
    color:var(--ink);
    font-family:"Malgun Gothic","Apple SD Gothic Neo",system-ui,sans-serif;
    display:flex;flex-direction:column;align-items:center;height:100%;overflow:hidden;
  }
  #top{width:100%;max-width:720px;padding:12px 18px 8px;text-align:center}
  #top h1{margin:0;font-size:16px;letter-spacing:3px;color:#dfe3ea;font-weight:700}

  #stage{width:100%;max-width:720px;flex:1;display:flex;flex-direction:column;
         min-height:0;padding:0 14px 10px;cursor:pointer}
  #log{flex:1;overflow-y:auto;padding:10px 4px 6px;display:flex;flex-direction:column;gap:12px;
       scroll-behavior:smooth}
  .row{display:flex}
  .row.L{justify-content:flex-start}
  .row.R{justify-content:flex-end}
  .row.C{justify-content:center}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  .narr{align-self:stretch;padding:4px 6px 4px 16px;border-left:3px solid rgba(139,147,166,.5);
        color:#c6cdda;font-style:italic;line-height:1.75;font-size:15px;white-space:pre-wrap;
        animation:rise .22s ease}
  .chat{align-self:stretch;font-size:13px;color:#8b93a6;line-height:1.55;padding:0 6px;
        white-space:pre-wrap;animation:rise .16s ease}

  .bubble{position:relative;max-width:82%;background:var(--panel);border:1px solid var(--line);
          border-left:4px solid var(--line);border-radius:12px;padding:10px 14px;
          animation:rise .22s ease}
  .row.R .bubble{border-left:1px solid var(--line);border-right:4px solid var(--line)}
  .bubble .name{font-size:12px;font-weight:800;margin-bottom:3px}
  .bubble .txt{font-size:15px;line-height:1.65;color:#eef1f6;white-space:pre-wrap}

  .cue{align-self:center;max-width:90%;font-size:14.5px;color:#0e1014;font-weight:800;text-align:center;
       line-height:1.5;background:linear-gradient(180deg,#ffe08a,#ffd24a);border:1px solid #c9a23b;
       border-radius:12px;padding:12px 18px;box-shadow:0 0 0 3px rgba(255,213,74,.16);animation:rise .22s ease}
  .cue .who{display:block;font-size:11px;color:#7a5c10;margin-bottom:3px;letter-spacing:1px}

  #bchoices{display:none;flex-direction:column;gap:8px;padding:8px 4px 4px}
  #bchoices button{width:100%;text-align:left;background:#1b2030;border:1px solid var(--line);
       color:var(--ink);padding:13px 16px;border-radius:11px;cursor:pointer;font-size:14.5px;
       font-family:inherit;line-height:1.5}
  #bchoices button:hover{border-color:var(--gold);color:#fff}
  #bchoices button::before{content:"▶";color:var(--gold);font-size:11px;margin-right:9px}

  #gate{display:none;flex-direction:column;align-items:center;gap:10px;text-align:center;
        padding:18px;margin:8px 0;background:linear-gradient(180deg,#1a1f2c,#141823);
        border:1px solid var(--line);border-radius:14px}
  #gate .lock{font-size:13px;color:var(--ink);font-weight:700}
  #gate .sub{font-size:12px;color:var(--muted)}
  #gate .inrow{display:flex;gap:8px;margin-top:2px}
  #gate input{background:#0e1118;border:1px solid var(--line);color:var(--ink);
       padding:11px 14px;border-radius:10px;font-size:16px;font-family:inherit;width:160px;
       text-align:center;letter-spacing:3px}
  #gate input:focus{outline:none;border-color:var(--gold)}
  #gate button{background:linear-gradient(180deg,#243047,#1a2235);border:1px solid var(--gold);
       color:var(--gold);font-weight:800;padding:11px 18px;border-radius:10px;cursor:pointer;
       font-family:inherit;font-size:14px}
  #gate button:hover{background:#2a3550;color:#fff}
  #gate .err{font-size:12.5px;color:#ff8585;min-height:16px}

  #hint{height:22px;text-align:center;color:var(--muted);font-size:12px;
        padding-top:2px;user-select:none;animation:pulse 1.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.4}50%{opacity:.9}}
</style>
</head>
<body>
  <div id="top"><h1>논리 루트 &mdash; 결착</h1></div>
  <div id="stage">
    <div id="log"></div>
    <div id="bchoices"></div>
    <div id="gate">
      <div class="lock">🔒 결말 비밀번호</div>
      <div class="sub">진행자에게 받은 비밀번호를 입력하세요.</div>
      <div class="inrow">
        <input id="pw" type="text" inputmode="numeric" autocomplete="off" placeholder="••••">
        <button id="pwbtn">확인</button>
      </div>
      <div class="err" id="pwerr"></div>
    </div>
    <div id="hint">▼ 클릭하여 계속</div>
  </div>

  <script src="enc.js"></script>
<script>
/* ============================================================
   결착 대사 (엔딩 직전 공통부) — 평문
   ============================================================ */
const STORY = [
 {s:"토키토", t:`아니, 그럴 리 없어!`},
 {n:`……토키토는 당황하여 허둥대다 무릎을 꿇었다. 그는 양손으로 머리를 쥐어뜯으며 초점을 잃은 눈을 하고 있다. 미나토는 한층 더 그를 몰아붙인다.`},
 {s:"미나토", t:`당신은 이능을 쓰지 않고도 범행을 저지를 수 있었어!`},
 {s:"토키토", t:`거짓말이야, 거짓말. 나는 이능으로 복수했다고……`},
 {n:`토키토는 꼬인 발음으로 중얼거린다.`},
 {s:"미나토", t:`이능을 썼든 쓰지 않았든, 어느 쪽 추리든 간에…… 두 개로 갈라진 달을 닫을 수 있었던 인물은 당신 이외에는 존재하지 않아요!`},
 {s:"미나토", t:`범행을 인정하고 어머니의 마음과 마주해 주세요! 당신과 어머니의 갈라진 관계를 되돌릴 수 있는 사람은 당신뿐이란 말이에요!`},
];

/* ============================================================
   엔진
   ============================================================ */
const SPK={
  "미나토":{c:"var(--mina)",side:"L"},
  "츠키시로":{c:"var(--tsuki)",side:"L"},
  "토키토":{c:"var(--toki)",side:"R"},
};
function spk(n){ return SPK[n]||{c:"#b8c0cc",side:"C"}; }

const log=document.getElementById('log');
const stage=document.getElementById('stage');
const hint=document.getElementById('hint');
const gate=document.getElementById('gate');
const bchoices=document.getElementById('bchoices');
const pwInput=document.getElementById('pw');
const pwBtn=document.getElementById('pwbtn');
const pwErr=document.getElementById('pwerr');

let phase='story';     // 'story' | 'gate' | 'branch'
let i=0;
// branch runner 상태
let branch=null, bi=0, bq=[], bEnd=false, bWait=false, bFin=false;

function el(t,a){ const e=document.createElement(t); for(const k in a) e.setAttribute(k,a[k]); return e; }
function add(node){ log.appendChild(node); log.scrollTop=log.scrollHeight; }

function narr(text){ const d=el('div',{class:'narr'}); d.appendChild(document.createTextNode(text)); add(d); }
function chatLine(text){ const d=el('div',{class:'chat'}); d.appendChild(document.createTextNode(text)); add(d); }
function dlg(name,text){
  const s=spk(name);
  const row=el('div',{class:'row '+s.side});
  const b=el('div',{class:'bubble'}); b.style.borderColor=s.c;
  const nm=el('div',{class:'name'}); nm.style.color=s.c; nm.textContent=name;
  const tx=el('div',{class:'txt'}); tx.textContent=text;
  b.appendChild(nm); b.appendChild(tx); row.appendChild(b); add(row);
}
function cueBox(text){
  const row=el('div',{class:'row C'}); const d=el('div',{class:'cue'});
  const who=el('span',{class:'who'}); who.textContent='🎤 당신의 차례';
  d.appendChild(who); d.appendChild(document.createTextNode(text)); row.appendChild(d); add(row);
}
function renderStep(step){
  if(step.n!=null) narr(step.n);
  else if(step.chat!=null) chatLine(step.chat);
  else if(step.cue!=null) cueBox(step.cue);
  else dlg(step.s, step.t);
}

/* ---- Phase 1: 결착 대사 ---- */
function advanceStory(){
  if(i>=STORY.length){ openGate(); return; }
  renderStep(STORY[i]); i++;
  if(i>=STORY.length) hint.style.display='none';   // 다음 클릭은 게이트
}
function openGate(){
  phase='gate'; hint.style.display='none';
  gate.style.display='flex';
  gate.scrollIntoView({behavior:'smooth'});
  pwInput.focus();
}

/* ---- 비밀번호 → 복호화 ---- */
async function decryptBlob(b64, pw){
  const raw=Uint8Array.from(atob(b64), c=>c.charCodeAt(0));
  const salt=raw.slice(0,16), iv=raw.slice(16,28), ct=raw.slice(28);
  const km=await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2', salt, iterations:200000, hash:'SHA-256'}, km,
      {name:'AES-GCM', length:256}, false, ['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, ct);
  return JSON.parse(new TextDecoder().decode(pt));
}
async function submitPw(){
  const pw=(pwInput.value||'').trim();
  if(!pw) return;
  pwBtn.disabled=true; pwErr.style.color='var(--muted)'; pwErr.textContent='확인 중…';
  for(const k of Object.keys(window.ENC||{})){
    try{ const steps=await decryptBlob(window.ENC[k], pw); startBranch(steps); return; }
    catch(e){ /* 다음 분기 시도 */ }
  }
  pwBtn.disabled=false; pwErr.style.color='#ff8585'; pwErr.textContent='비밀번호가 올바르지 않습니다.';
}
pwBtn.addEventListener('click',e=>{ e.stopPropagation(); submitPw(); });
pwInput.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); submitPw(); } });
pwInput.addEventListener('click',e=>e.stopPropagation());

/* ---- Phase 3: 분기(선택지 게임) 재생 ---- */
function startBranch(steps){
  phase='branch'; gate.style.display='none';
  branch=steps; bi=0; bq=[]; bEnd=false; bWait=false; bFin=false;
  hint.style.display='';
  brStep();
}
function brStep(){
  if(bWait||bFin) return;
  if(bq.length){
    renderStep(bq.shift());
    if(bq.length===0){ bEnd ? finishBranch() : brMaybeChoice(); }
    return;
  }
  if(bi>=branch.length){ finishBranch(); return; }
  const step=branch[bi];
  if(step.choice){ brShowChoice(step.choice); return; }
  bi++; renderStep(step); brMaybeChoice();
}
function brMaybeChoice(){ if(bi<branch.length && branch[bi].choice) brShowChoice(branch[bi].choice); }
function brShowChoice(opts){
  bWait=true; hint.style.display='none'; bchoices.innerHTML='';
  opts.forEach(o=>{
    const btn=el('button',{}); btn.textContent=o.label;
    btn.addEventListener('click',ev=>{ ev.stopPropagation(); brPick(o); });
    bchoices.appendChild(btn);
  });
  bchoices.style.display='flex'; log.scrollTop=log.scrollHeight;
}
function brPick(o){
  bWait=false; bchoices.style.display='none'; bchoices.innerHTML='';
  hint.style.display=''; bi++;                 // 선택지 스텝 통과
  if(o.say) dlg(o.say, o.label);               // 고른 문장을 화자 대사로
  bEnd=!!o.end;
  bq=(o.reply||[]).slice();
  if(bq.length){
    renderStep(bq.shift());
    if(bq.length===0){ bEnd ? finishBranch() : brMaybeChoice(); }
  }else{
    bEnd ? finishBranch() : brMaybeChoice();
  }
}
function finishBranch(){ bFin=true; hint.style.display='none'; }

/* ---- 클릭 진행 ---- */
stage.addEventListener('click',e=>{
  if(e.target.closest('button')||e.target.closest('#gate')) return;
  if(phase==='story') advanceStory();
  else if(phase==='branch'){ if(!bWait) brStep(); }
});
advanceStory();
</script>
</body>
</html>
